name: Weekly Pipeline Run

on:
  schedule:
    - cron: '0 1 * * 1'  # Monday 01:00 UTC = 06:30 IST
  workflow_dispatch:
    inputs:
      retrain:
        description: 'Force MOS retrain after pipeline run'
        type: boolean
        default: false

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wake HF Space
        run: |
          echo "Restarting Market Intelligence Space..."
          curl -s -X POST \
            "https://huggingface.co/api/spaces/jtlevine/market-intelligence/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            || true
          echo "Waiting for Space to boot..."
          sleep 90

      - name: Trigger pipeline run
        run: |
          echo "Triggering pipeline..."
          TRIGGER=$(curl -s -X POST \
            "https://jtlevine-market-intelligence.hf.space/api/pipeline/trigger" \
            -H "Content-Type: application/json")
          echo "Trigger response: $TRIGGER"

      - name: Wait for pipeline completion
        run: |
          MAX_WAIT=900  # 15 minutes
          ELAPSED=0
          INTERVAL=30
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s "https://jtlevine-market-intelligence.hf.space/api/pipeline/status" 2>/dev/null || echo '{}')
            RUNNING=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('running', True))" 2>/dev/null || echo "true")
            STEP=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('current_step', '?'))" 2>/dev/null || echo "?")
            echo "[$ELAPSED s] running: $RUNNING, step: $STEP"
            if [ "$RUNNING" = "False" ]; then
              echo "Pipeline completed!"
              HEALTH=$(curl -s "https://jtlevine-market-intelligence.hf.space/health" 2>/dev/null || echo '{}')
              echo "Health: $HEALTH"
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Timed out waiting for pipeline"
          exit 1

      - name: Monthly MOS retrain
        if: success()
        run: |
          # Retrain on 4th Monday of each month, or if manually requested
          DAY=$(date +%d)
          FORCE_RETRAIN="${{ github.event.inputs.retrain }}"

          if [ "$DAY" -ge 22 ] || [ "$FORCE_RETRAIN" = "true" ]; then
            echo "Triggering MOS retrain..."
            RESULT=$(curl -s -X POST \
              "https://jtlevine-market-intelligence.hf.space/api/pipeline/retrain-mos" \
              -H "Content-Type: application/json")
            echo "Retrain response: $RESULT"
            echo "Waiting 60s for retrain to complete..."
            sleep 60
            echo "MOS retrain done (check Space logs for details)"
          else
            echo "Not 4th week (day=$DAY) — skipping retrain"
          fi

      - name: Pause HF Space
        if: always()
        run: |
          echo "Pausing Space to stop billing..."
          curl -s -X POST \
            "https://huggingface.co/api/spaces/jtlevine/market-intelligence/pause" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            || true
          echo "Space paused."
